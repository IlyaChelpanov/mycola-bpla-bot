services:
  - type: worker
    name: mycola-bpla-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: MODEL
        value: gpt-4o
      - key: SYSTEM_PROMPT
        sync: false
      - key: MAX_TOKENS
        value: "500"
      - key: RATE_LIMIT_SECONDS
        value: "5"
